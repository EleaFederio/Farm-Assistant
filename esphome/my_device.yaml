esphome:
  name: my-device
  friendly_name: My Device

api:

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

web_server:
  port: 80

i2c:
  sda: GPIO3
  scl: GPIO4
  scan: true

# GY-30 / BH1750 light sensor
sensor:
  - platform: bh1750
    name: "GY-30 Illuminance"
    id: gy30_lux
    address: 0x23
    update_interval: 60s

# HTTP Client to POST data to Farm Assistant
http_request:
  useragent: "ESPHome Farm Assistant"
  verify_ssl: false

interval:
  - interval: 60s
    then:
      - http_request.post:
          url: !secret farm_assistant_url  # e.g. http://192.168.1.100:8000/api/esphome/webhook
          request_headers:
            Content-Type: application/json
          json:
            device: "greenhouse-node-1"
            entity_id: "sensor.gy_30_illuminance"
            value: !lambda |-
              return to_string(id(gy30_lux).state);
            unit: "lux"
            device_class: "illuminance"
            entity_type: "sensor"
      - logger.log: "Data sent to Farm Assistant"